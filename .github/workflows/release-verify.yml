name: release-verify

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: "Exact GitHub draft release ID"
        required: true
        type: string
      tag:
        description: "Exact draft tag (for example v0.12.1)"
        required: true
        type: string
      commit:
        description: "Exact full protected-main commit SHA"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  native-darwin-verifier:
    name: native-darwin-${{ matrix.arch }}
    if: >-
      ${{
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
        github.workflow_ref == format('{0}/.github/workflows/release-verify.yml@refs/heads/{1}', github.repository, github.event.repository.default_branch)
      }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout protected verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Validate candidate commit belongs to protected default branch
        env:
          RELEASE_COMMIT: ${{ inputs.commit }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TRUSTED_WORKFLOW_SHA: ${{ github.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$TRUSTED_WORKFLOW_SHA"
          if [[ ! "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::commit must be a full lowercase SHA"
            exit 1
          fi
          git cat-file -e "${RELEASE_COMMIT}^{commit}"
          git merge-base --is-ancestor "$RELEASE_COMMIT" "origin/$DEFAULT_BRANCH"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Setup exact Go toolchain for build-info verification
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download exact draft assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ inputs.release_id }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          VERIFY_ARCH: ${{ matrix.arch }}
        run: |
          node scripts/download-release-candidate.mjs \
            --release-id "$RELEASE_ID" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --output "$RUNNER_TEMP/release-candidate"

      - name: Verify candidate with no token or release credential
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          VERIFY_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -m 700 "$RUNNER_TEMP/verify-home"
          env -i \
            HOME="$RUNNER_TEMP/verify-home" \
            LANG=C \
            LC_ALL=C \
            PATH="$PATH" \
            TMPDIR="$RUNNER_TEMP" \
            node scripts/verify-release-candidate.mjs \
              --release-id "$RELEASE_ID" \
              --tag "$RELEASE_TAG" \
              --commit "$RELEASE_COMMIT" \
              --host-arch "$VERIFY_ARCH" \
              --dir "$RUNNER_TEMP/release-candidate"
